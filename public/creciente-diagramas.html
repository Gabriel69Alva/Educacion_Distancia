<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escenario Interactivo: Sucesiones Crecientes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card-container">
    <header class="app-header">
      <h2>Sucesiones Crecientes</h2>
      <p>Arrastra las flechas del dominio para construir una sucesión estrictamente creciente. <br> 
         Recuerda la regla: si $x < y$, entonces $a(x) < a(y)$.</p>
    </header>

    <div class="canvas-wrapper">
      <canvas id="myCanvas" width="700" height="420"></canvas>
    </div>

    <div class="action-buttons">
      <button id="bTerminad" class="btn btn-primary" onclick="validarRespuestas()">
        Validar actividad
      </button>
      <button class="btn btn-secondary" onclick="reiniciarEscenario()">
        Nuevo intento
      </button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.2.4/fabric.min.js" integrity="sha512-HkRNCiaZYxQAkHpLFYI90ObSzL0vaIXL8Xe3bM51vhdYI79RDFMLTAsmVH1xVPREmTlUWexgrQMk+c3RBTsLGw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
